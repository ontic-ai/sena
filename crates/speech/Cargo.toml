[package]
name = "speech"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
bus = { path = "../bus" }
tokio = { workspace = true, features = ["fs"] }
async-trait = { workspace = true }
thiserror = { workspace = true }

# Audio I/O (cross-platform)
cpal = "0.15"

# TTS backend (platform-native via unified interface)
tts = "0.26"

# Model download (Phase 5 only — speech models from HuggingFace)
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream"] }
sha2 = "0.10"
futures-util = "0.3"
hex = "0.4"

# STT backend (Whisper.cpp)
# NOTE: whisper-rs requires whisper.cpp C++ library
# For testing/development without whisper.cpp, use Mock backend
whisper-rs = { version = "0.12", optional = true }

[dev-dependencies]
tempfile = "3"

[features]
default = []
# Enable real whisper.cpp backend (requires whisper.cpp installed)
whisper = ["whisper-rs"]
