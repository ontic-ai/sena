[package]
name = "speech"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
bus = { path = "../bus" }
tokio = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }

# Audio I/O (cross-platform)
cpal = "0.15"

# TTS backend (platform-native via unified interface)
tts = "0.26"

# STT backend (Whisper.cpp)
# NOTE: whisper-rs requires whisper.cpp C++ library
# For testing/development without whisper.cpp, use Mock backend
whisper-rs = { version = "0.12", optional = true }

[features]
default = []
# Enable real whisper.cpp backend (requires whisper.cpp installed)
whisper = ["whisper-rs"]
