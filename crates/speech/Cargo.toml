[package]
name = "speech"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
bus = { path = "../bus" }
tokio = { workspace = true, features = ["fs"] }
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

# Audio I/O (cross-platform)
cpal = "0.15"

# TTS backend (platform-native via unified interface)
tts = "0.26"

# STT backend - Whisper via candle-transformers (pure Rust)
candle-core = { version = "0.10", default-features = false }
candle-nn = { version = "0.10", default-features = false }
candle-transformers = { version = "0.10", default-features = false }
tokenizers = { version = "0.21", default-features = false, features = ["onig"] }
rand = { workspace = true }
byteorder = "1"
serde_json = "1"

[dev-dependencies]
tempfile = "3"
