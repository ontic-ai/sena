[build]
# Workspace-level build configuration
target-dir = "target"

[target.x86_64-pc-windows-msvc]
# /DEBUG:FASTLINK avoids LNK1318 "PDB LIMIT" errors on large debug builds by
# storing references to object files instead of copying all debug info into the PDB.
# /FORCE:MULTIPLE allows duplicate ggml symbols from whisper-rs-sys and llama-cpp-sys-2
# (both bundle ggml; both use the same implementation so duplicate-silencing is safe).
rustflags = ["-C", "link-arg=/DEBUG:FASTLINK", "-C", "link-arg=/FORCE:MULTIPLE"]

[term]
# Better terminal output
verbose = false
color = "auto"

[profile.dev]
# Development profile optimizations
incremental = true
opt-level = 0

[profile.release]
# Release profile settings
lto = true
codegen-units = 1
strip = true
opt-level = 3

[alias]
xtask = "run --manifest-path xtask/Cargo.toml --"