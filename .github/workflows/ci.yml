name: CI

on:
  pull_request:
    branches: [ dev, main ]

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux: native dependencies for rdev (X11 input) and arboard (clipboard) ──
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake \
            libxtst-dev \
            libx11-dev \
            libxi-dev \
            xclip \
            libgtk-3-dev

      # ── Rust toolchain — pinned to stable per rust-toolchain.toml ──
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # ── Cache cargo registry and git deps (not target/ — stale artifacts cause subtle failures) ──
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Quality gates — all four must pass ──

      - name: Build
        working-directory: sena
        run: cargo build --workspace

      - name: Test
        working-directory: sena
        run: cargo test --workspace

      - name: Clippy
        working-directory: sena
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          mapfile -t files < <(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- 'sena/**/*.rs')

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Rust files changed"
            exit 0
          fi

          rustfmt --check --edition 2024 "${files[@]}"
